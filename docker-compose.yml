services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - APP_DEBUG=${APP_DEBUG:-false}
      - AI_API_KEY=${AI_API_KEY}
      - AI_API_URL=${AI_API_URL:-https://api.openai.com/v1/chat/completions}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - DB_PATH=/data/financial.db
    volumes:
      - db_data:/data
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    networks:
      - app

volumes:
  db_data:
  vendor:

networks:
  app:
    driver: bridge
