services:
  backend:
    build: ./financial-analyzer-backend
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DB_PATH=/data/financial.db
    volumes:
      - db_data:/data
      - ./financial-analyzer-backend:/var/www/html
    networks:
      - app

volumes:
  db_data:

networks:
  app:
    driver: bridge
