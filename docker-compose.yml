services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DB_PATH=/data/financial.db
    volumes:
      - db_data:/data
      - ./backend:/var/www/html
    networks:
      - app

  frontend:
    build: ./financial-analyzer-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    volumes:
      - ./financial-analyzer-frontend:/app
      - /app/node_modules
    networks:
      - app

volumes:
  db_data:

networks:
  app:
    driver: bridge
