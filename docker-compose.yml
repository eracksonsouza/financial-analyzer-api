services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - APP_DEBUG=${APP_DEBUG:-false}
      - AI_API_KEY=${AI_API_KEY}
      - AI_API_URL=${AI_API_URL:-https://api.openai.com/v1/chat/completions}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/financial}
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      - db
    networks:
      - app

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=financial
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app

volumes:
  pg_data:
  vendor:

networks:
  app:
    driver: bridge
